<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Quixote — Marketing Site UI Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #030405; color: #f3f5f8; min-height: 100vh; width: 100%; overflow-x: hidden; color-scheme: dark; }
    #root { min-height: 100vh; position: relative; }
    a:hover { text-decoration: underline !important; }
    .qx-btn-primary:hover { opacity: 1; transform: translateY(-1px); }
    .qx-btn-primary:active { transform: scale(0.98); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./SitePrimitives.jsx"></script>
  <script type="text/babel" src="./SiteHero.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div>
          <QxDitherBackground />
          <main style={{
            position: 'relative', zIndex: 1,
            maxWidth: 720, margin: '0 auto',
            padding: '96px 24px 56px',
            display: 'flex', flexDirection: 'column', gap: 80,
          }}>
            <QxSiteHero logoSrc="../../assets/icon-512.png" />
            <QxSiteFooter />
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
