<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Quixote — Settings API Key States</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #111113; font-family: "Inter Tight", system-ui, sans-serif; color: #f2f2f5; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ─── tokens ───────────────────────────────────────────────────────────────────
const T = {
  appBg:   '#17171a',
  panel:   '#212124',
  panelRaised: '#2a2a2e',
  card:    '#1c1c1f',
  cardRow: '#252528',
  sel:     '#38383d',
  div:     'rgba(255,255,255,0.08)',
  fg1: '#f2f2f5',
  fg2: '#8f97ad',
  fg3: '#6e7382',
  blue:   '#306bf0',
  green:  '#38db7a',
  red:    '#d42945',
  orange: '#f29e3b',
  sans: '"Inter Tight", system-ui, sans-serif',
  mono: '"JetBrains Mono", ui-monospace, monospace',
};

// ─── utility components ───────────────────────────────────────────────────────

function EyeIcon({ open = true, size = 16 }) {
  return open ? (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  ) : (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
  );
}

function CheckIcon({ size = 14, color = T.green }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  );
}

function XCircle({ size = 14, color = T.red }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
  );
}

function WarnIcon({ size = 14, color = T.orange }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  );
}

function Spinner({ size = 13, color = T.fg2 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      border: `2px solid rgba(255,255,255,0.1)`,
      borderTopColor: color,
      animation: 'spin 0.7s linear infinite',
      flexShrink: 0,
    }}/>
  );
}

// macOS-style round-button
function Btn({ label, variant = 'default', disabled }) {
  const bg   = variant === 'primary' ? T.blue : T.cardRow;
  const fg   = variant === 'primary' ? '#fff' : disabled ? T.fg3 : T.fg1;
  const bdr  = `1px solid ${T.div}`;
  return (
    <button disabled={!!disabled} style={{
      background: disabled ? 'rgba(255,255,255,0.04)' : bg,
      color: fg, border: bdr, borderRadius: 8,
      fontFamily: T.sans, fontSize: 13, fontWeight: 500,
      padding: '5px 14px', cursor: disabled ? 'default' : 'pointer',
      whiteSpace: 'nowrap',
    }}>{label}</button>
  );
}

// ─── macOS window ─────────────────────────────────────────────────────────────

function SettingsWindow({ children, highlight }) {
  return (
    <div style={{
      width: 370, background: T.panel,
      borderRadius: 14, overflow: 'hidden',
      border: '1px solid rgba(255,255,255,0.08)',
      boxShadow: '0 32px 80px rgba(0,0,0,0.55)',
      fontFamily: T.sans, color: T.fg1,
    }}>
      {/* title bar */}
      <div style={{
        display: 'flex', alignItems: 'center', height: 40,
        background: T.panelRaised,
        borderBottom: `1px solid ${T.div}`,
        position: 'relative',
      }}>
        <div style={{ display: 'flex', gap: 8, padding: '0 14px' }}>
          {['#ff5f57','#febc2e','#28c840'].map((c,i) => (
            <div key={i} style={{ width: 12, height: 12, borderRadius: '50%', background: c }}/>
          ))}
        </div>
        <div style={{
          position: 'absolute', left: '50%', transform: 'translateX(-50%)',
          fontSize: 13, fontWeight: 600, color: T.fg1,
        }}>Settings</div>
      </div>



      {/* body */}
      <div style={{ padding: '20px 18px 22px', display: 'flex', flexDirection: 'column', gap: 18 }}>
        {/* API Keys section */}
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: T.fg1, marginBottom: 12 }}>API Keys</div>
          {children}
        </div>

        {/* Processing section (static context) */}
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: T.fg1, marginBottom: 10 }}>Processing</div>
          <div style={{
            background: T.card, borderRadius: 10, border: `1px solid ${T.div}`,
            overflow: 'hidden',
          }}>
            {[['Concurrency', '2'],['Rate limit','5 req/s'],['Max retries','3']].map(([lbl, val], i, arr) => (
              <div key={lbl} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '10px 14px',
                borderBottom: i < arr.length-1 ? `1px solid ${T.div}` : 'none',
                fontSize: 14,
              }}>
                <span style={{ color: T.fg1 }}>{lbl}: {val}</span>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                  {['^','v'].map(g => (
                    <button key={g} style={{
                      background: T.panelRaised, border: `1px solid ${T.div}`, borderRadius: 4,
                      color: T.fg2, width: 22, height: 14, cursor: 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 9, fontWeight: 700,
                    }}>{g}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── the API key card with all state variations ───────────────────────────────

function KeySection({ state }) {
  /*
    state:
      blank        — empty, no focus
      focused      — empty, focused with cursor
      typing       — partially typed, focused
      masked       — filled, blur, dots
      reveal       — masked but eye toggled
      validating   — blur+save pressed, spinner
      valid        — green check, models count
      invalid      — red, shake, error
      saved        — green flash "Saved to Keychain"
      revoked      — orange warning, key no longer works
  */

  const isBlank      = state === 'blank';
  const isFocused    = state === 'focused';
  const isTyping     = state === 'typing';
  const isMasked     = state === 'masked';
  const isReveal     = state === 'reveal';
  const isValidating = state === 'validating';
  const isValid      = state === 'valid';
  const isInvalid    = state === 'invalid';
  const isSaved      = state === 'saved';
  const isRevoked    = state === 'revoked';

  // field border
  const borderColor =
    (isFocused || isTyping) ? T.blue :
    (isValid || isSaved)    ? T.green :
    isInvalid               ? T.red :
    isRevoked               ? T.orange :
    isValidating            ? T.blue :
    T.div;

  const fieldShadow =
    (isFocused || isTyping) ? '0 0 0 3px rgba(48,107,240,0.22)' :
    (isValid || isSaved)    ? '0 0 0 3px rgba(56,219,122,0.18)' :
    isInvalid               ? '0 0 0 3px rgba(212,41,69,0.2)'   :
    isRevoked               ? '0 0 0 3px rgba(242,158,59,0.18)' :
    'none';

  // what to show in the text area
  const fieldText =
    isBlank                           ? null :
    isFocused                         ? null :
    isTyping                          ? 'sk-proj-T3...' :
    (isMasked || isValidating)        ? '•'.repeat(20) :
    isReveal                          ? 'sk-proj-T3kd8mWx...' :
    (isValid || isSaved)              ? '•'.repeat(20) :
    isInvalid                         ? '•'.repeat(20) :
    isRevoked                         ? '•'.repeat(20) :
    null;

  const placeholder = (isBlank || isFocused) ? 'sk-...' : null;

  // right-side of the field row: icon inside field
  let inlineIcon = null;
  if (isValidating) inlineIcon = <Spinner size={13} color={T.blue} />;
  else if (isValid || isSaved) inlineIcon = <CheckIcon size={13} color={T.green} />;
  else if (isInvalid) inlineIcon = <XCircle size={13} color={T.red} />;
  else if (isRevoked) inlineIcon = <WarnIcon size={13} color={T.orange} />;

  // eye button: only shown when there's a value to reveal
  const showEye = isMasked || isReveal || isValidating || isValid || isInvalid || isSaved || isRevoked;
  const eyeOpen = isReveal;

  // status message below the row
  let statusLine = null;
  if (isValidating) {
    statusLine = { text: 'Validating key…', color: T.fg2, icon: null };
  } else if (isValid) {
    statusLine = { text: '47 models available · validated just now', color: T.green, icon: <CheckIcon size={12} color={T.green} /> };
  } else if (isSaved) {
    statusLine = { text: 'Saved to Keychain', color: T.green, icon: <CheckIcon size={12} color={T.green} /> };
  } else if (isInvalid) {
    statusLine = { text: 'Invalid API key — check your key and try again', color: T.red, icon: <XCircle size={12} color={T.red} /> };
  } else if (isRevoked) {
    statusLine = { text: 'Key may be revoked — requests are failing', color: T.orange, icon: <WarnIcon size={12} color={T.orange} /> };
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      {/* key row card */}
      <div style={{
        background: T.card, borderRadius: 10, border: `1px solid ${T.div}`,
        padding: '8px 10px', display: 'flex', alignItems: 'center', gap: 8,
        animation: isInvalid ? 'shake 320ms ease-out' : 'none',
      }}>
        {/* text input */}
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', gap: 6,
          background: T.cardRow, borderRadius: 7,
          border: `1.5px solid ${borderColor}`,
          boxShadow: fieldShadow,
          padding: '5px 10px', height: 30,
          transition: 'border-color 120ms, box-shadow 120ms',
        }}>
          <div style={{
            flex: 1, fontFamily: T.mono, fontSize: 13,
            color: fieldText ? T.fg2 : T.fg3,
            letterSpacing: (isMasked || isValidating || isValid || isInvalid || isSaved || isRevoked) ? '0.1em' : '0',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>
            {fieldText
              ? <span>{fieldText}</span>
              : <span style={{ color: T.fg3 }}>{placeholder || ''}</span>}
            {(isFocused || isTyping) && (
              <span style={{
                display: 'inline-block', width: 1.5, height: 13,
                background: T.blue, verticalAlign: 'middle', marginLeft: 1,
                animation: 'blink 1.1s step-end infinite',
              }}/>
            )}
          </div>
          {inlineIcon && <div style={{ flexShrink: 0 }}>{inlineIcon}</div>}
        </div>

        {/* eye toggle */}
        {showEye ? (
          <button style={{
            background: 'none', border: 'none', cursor: 'pointer',
            color: eyeOpen ? T.fg1 : T.fg2, padding: 4, borderRadius: 6,
            display: 'flex', alignItems: 'center',
          }}>
            <EyeIcon open={eyeOpen} size={16} />
          </button>
        ) : (
          /* placeholder so layout stays identical */
          <div style={{ width: 26 }} />
        )}

        {/* action buttons */}
        <Btn
          label="Save"
          variant={isTyping || isFocused ? 'primary' : 'default'}
          disabled={isBlank || isValidating || isValid || isSaved}
        />
        <Btn
          label={isValidating ? 'Test' : 'Test'}
          disabled={isBlank || isFocused || isValidating}
        />
      </div>

      {/* status message */}
      {statusLine && (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 6,
          padding: '0 2px',
          animation: 'none',
        }}>
          {statusLine.icon}
          <span style={{
            fontFamily: T.sans, fontSize: 12, color: statusLine.color,
            animation: isSaved ? 'blink 0.5s ease-out 2' : 'none',
          }}>{statusLine.text}</span>
        </div>
      )}
    </div>
  );
}

// ─── each artboard: full window with that state ───────────────────────────────

const STATES = [
  { id: 'blank',      label: '1 · Blank',        state: 'blank' },
  { id: 'focused',    label: '2 · Focused (empty)', state: 'focused' },
  { id: 'typing',     label: '3 · Typing',        state: 'typing' },
  { id: 'masked',     label: '4 · Blur + masked', state: 'masked' },
  { id: 'reveal',     label: '5 · Revealed',      state: 'reveal' },
  { id: 'validating', label: '6 · Validating',    state: 'validating' },
  { id: 'valid',      label: '7 · Valid',         state: 'valid' },
  { id: 'saved',      label: '8 · Saved',         state: 'saved' },
  { id: 'invalid',    label: '9 · Invalid',       state: 'invalid' },
  { id: 'revoked',    label: '10 · Revoked',      state: 'revoked' },
];

function App() {
  return (
    <DesignCanvas>
      <DCSection id="key-states" title="API Key field states" subtitle="Blank → typing → masked → valid → invalid → saved → revoked">
        {STATES.map(({ id, label, state }) => (
          <DCArtboard key={id} id={id} label={label} width={370} height={480}>
            <SettingsWindow>
              <KeySection state={state} />
            </SettingsWindow>
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
