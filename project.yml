name: QuixoteSwift
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.c0

configs:
  Debug: debug
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    minorVersion: "2.6.0"

targets:
  QuixoteSwift:
    type: application
    platform: macOS
    sources:
      - QuixoteSwift/
    settings:
      base:
        PRODUCT_NAME: "Quixote Swift"
        PRODUCT_BUNDLE_IDENTIFIER: com.c0.quixote-swift
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
    entitlements:
      path: QuixoteSwift/QuixoteSwift.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spks
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spki
    info:
      path: QuixoteSwift/Info.plist
      properties:
        CFBundleName: QuixoteSwift
        CFBundleDisplayName: Quixote Swift
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        SUFeedURL: "https://c0.github.io/quixote-swift/appcast.xml"
        SUPublicEDKey: "REPLACE_WITH_YOUR_PUBLIC_ED_KEY"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - quixote-swift
    dependencies:
      - package: Sparkle
