name: Quixote
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.c0

configs:
  Debug: debug
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    minorVersion: "2.6.0"
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX
    minorVersion: "0.14.1"

targets:
  Quixote:
    type: application
    platform: macOS
    sources:
      - Quixote/
      - path: assets/app.icon
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Quixote"
        PRODUCT_BUNDLE_IDENTIFIER: com.c0.quixote
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BH93JMP63R
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "6"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: app
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
    entitlements:
      path: Quixote/Quixote.entitlements
    info:
      path: Quixote/Info.plist
      properties:
        CFBundleName: Quixote
        CFBundleDisplayName: Quixote
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "Copyright © 2026 Caleb Wright. All rights reserved."
        SUFeedURL: "https://c0.github.io/quixote/appcast.xml"
        SUPublicEDKey: "mOqmS1/jRRiLCjWyLnh/i2bwNj5MlxBm/4Ie2EPTN+E="
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - quixote
    dependencies:
      - package: Sparkle
      - package: CoreXLSX
